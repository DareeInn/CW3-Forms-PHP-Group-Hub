<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buy a Grade</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <h1>Buy a Grade</h1>
    <form action="sucker.php" method="post">
      <label>
        Student name:
        <input type="text" name="name" required>
      </label>
      <label>
        Student email:
        <input type="email" name="email" required>
      </label>
      <label>
        Course:
        <input type="text" name="course">
      </label>
      <label>
        Amount (USD):
        <input type="number" name="amount" min="0" step="0.01">
      </label>
      <button type="submit">Submit</button>
    </form>
    <p><a href="suckers.html">View previous submissions</a></p>
  </main>
</body>
</html>
